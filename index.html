<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동작 보라매역 프리센트</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-down { animation: fadeInDown 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useRef } = React;

        // Firebase 설정 (환경 변수가 있으면 우선 사용, 없으면 기존 하드코딩 값 사용)
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDw6rUaE7mxMrywGjAMAtv0Z4vGqg8K8m8",
            authDomain: "precentacednc.firebaseapp.com",
            projectId: "precentacednc",
            storageBucket: "precentacednc.firebasestorage.app",
            messagingSenderId: "752941894819",
            appId: "1:752941894819:web:a4ca81c7d44107affb8316"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'construction-app';

        // 유틸리티 함수
        const getLocalYMD = (dateObj = new Date()) => {
            const offset = dateObj.getTimezoneOffset() * 60000;
            const localDate = new Date(dateObj.getTime() - offset);
            return localDate.toISOString().split('T')[0];
        };

        const INITIAL_RISK_MAPPING = {
            '가설공사': '추락(안전대 미체결), 자재 낙하', '토공사': '중장비 충돌/협착, 토사 붕괴', '철근콘크리트': '개구부 추락, 펌프카 타격', '철골공사': '고소작업 추락, 화재', '조적/미장/방수': '밀폐공간 질식', '전기/설비': '활선작업 감전', '기타': '자재 찔림/베임'
        };

        function App() {
            const [user, setUser] = useState(null);
            const [checklists, setChecklists] = useState([]);
            const [riskMapping, setRiskMapping] = useState(INITIAL_RISK_MAPPING);
            const [toasts, setToasts] = useState([]);

            const defaultTrade = Object.keys(INITIAL_RISK_MAPPING)[0];
            const [newCheck, setNewCheck] = useState({ date: getLocalYMD(), trade: defaultTrade, location: '', content: '', dueDate: getLocalYMD() });
            const [img, setImg] = useState(null);
            const fileRef = useRef(null);
            const [expandedImage, setExpandedImage] = useState(null);

            // 수정 모드 상태
            const [editingChecklist, setEditingChecklist] = useState(null);
            const [editImg, setEditImg] = useState(null);
            const editFileRef = useRef(null);

            const showToast = (message) => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };

            // Firebase 인증 (익명 로그인 처리)
            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try { await signInWithCustomToken(auth, __initial_auth_token); } catch(e) { await signInAnonymously(auth); }
                    } else { 
                        await signInAnonymously(auth); 
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // 실시간 데이터 가져오기
            useEffect(() => {
                if (!user) return;
                const checklistsCol = collection(db, 'artifacts', appId, 'public', 'data', 'checklists');
                
                const unsubscribeChecklists = onSnapshot(checklistsCol, (snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    // 메모리 상에서 최신순 정렬
                    data.sort((a, b) => b.createdAt - a.createdAt);
                    setChecklists(data);
                }, (error) => {
                    console.error("데이터 동기화 오류:", error);
                });

                const settingsDoc = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global');
                const unsubscribeSettings = onSnapshot(settingsDoc, (docSnap) => {
                    if (docSnap.exists() && docSnap.data().riskMapping) {
                        setRiskMapping(docSnap.data().riskMapping);
                    } else {
                        setDoc(settingsDoc, { riskMapping: INITIAL_RISK_MAPPING }, { merge: true });
                    }
                });

                return () => {
                    unsubscribeChecklists();
                    unsubscribeSettings();
                };
            }, [user]);

            // 이미지 첨부 및 리사이징 로직
            const processImage = (file, callback) => {
                const r = new FileReader();
                r.onloadend = () => {
                    const imgObj = new Image();
                    imgObj.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = imgObj.width;
                        let height = imgObj.height;
                        const MAX_WIDTH = 800; // 자동 압축 폭
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(imgObj, 0, 0, width, height);
                        callback(canvas.toDataURL('image/jpeg', 0.6));
                    };
                    imgObj.src = r.result;
                };
                r.readAsDataURL(file);
            };

            const handleImg = (e) => {
                const f = e.target.files[0];
                if (f) processImage(f, setImg);
            };

            const handleEditImg = (e) => {
                const f = e.target.files[0];
                if (f) processImage(f, setEditImg);
            };

            // 체크리스트 등록 핸들러
            const onSubmit = async (e) => {
                e.preventDefault();
                if(!user) return;
                
                try {
                    const newId = Date.now().toString();
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'checklists', newId), { 
                        ...newCheck, 
                        image: img,
                        isCompleted: false, 
                        createdAt: Date.now() 
                    });
                    
                    showToast('체크리스트가 등록되었습니다.');
                    setNewCheck({ ...newCheck, location: '', content: '' }); 
                    setImg(null); 
                    if(fileRef.current) fileRef.current.value = '';
                } catch(e) { 
                    alert('사진 용량이 너무 큽니다. 다른 사진을 선택하거나 기기의 용량을 확인해주세요.'); 
                }
            };

            // 완료 상태 토글 핸들러
            const handleToggleChecklist = async (id, isCompleted) => {
                if(!user) return;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'checklists', id), { isCompleted });
            };

            // 삭제 핸들러
            const handleDeleteChecklist = async (id) => {
                if(!user || !confirm('이 점검 항목을 삭제하시겠습니까?')) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'checklists', id));
                showToast('항목이 삭제되었습니다.');
            };

            // 수정 핸들러
            const handleUpdateSubmit = async (e) => {
                e.preventDefault();
                if(!user || !editingChecklist) return;
                
                try {
                    const updateData = {
                        date: editingChecklist.date,
                        trade: editingChecklist.trade,
                        location: editingChecklist.location,
                        dueDate: editingChecklist.dueDate,
                        content: editingChecklist.content,
                        image: editImg // 새로 설정된 이미지 또는 기존 이미지 유지
                    };
                    
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'checklists', editingChecklist.id), updateData);
                    showToast('점검 항목이 수정되었습니다.');
                    setEditingChecklist(null);
                    setEditImg(null);
                } catch(err) {
                    alert('수정 중 오류가 발생했습니다.');
                }
            };

            const handleAddTrade = async () => {
                if(!user) return;
                const newTrade = prompt('추가할 새로운 공종(업체명)을 입력하세요:');
                if (newTrade && newTrade.trim()) {
                    const trimmedTrade = newTrade.trim();
                    if (riskMapping[trimmedTrade]) {
                        alert('이미 존재하는 공종입니다.');
                        return;
                    }
                    // Firestore 설정에 공종 추가
                    const updatedMapping = { ...riskMapping, [trimmedTrade]: '추가 위험 요소' };
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), { riskMapping: updatedMapping }, { merge: true });
                    showToast(`'${trimmedTrade}' 항목이 추가되었습니다.`);
                    
                    // 등록 폼이나 수정 폼에서 새로 추가된 공종으로 자동 변경
                    setNewCheck(prev => ({...prev, trade: trimmedTrade}));
                    if(editingChecklist) setEditingChecklist(prev => ({...prev, trade: trimmedTrade}));
                }
            };

            const handleDeleteTrade = async (tradeToDelete) => {
                if(!user) return;
                if(Object.keys(riskMapping).length <= 1) {
                    alert('최소 1개의 공종은 남아있어야 합니다.');
                    return;
                }
                if (confirm(`'${tradeToDelete}' 공종을 정말 삭제하시겠습니까?`)) {
                    const updatedMapping = { ...riskMapping };
                    delete updatedMapping[tradeToDelete];
                    
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'global'), { riskMapping: updatedMapping }, { merge: true });
                    showToast(`'${tradeToDelete}' 공종이 삭제되었습니다.`);
                    
                    // 삭제된 공종이 현재 선택되어 있었다면 첫 번째 공종으로 변경
                    const firstAvailable = Object.keys(updatedMapping)[0];
                    if (newCheck.trade === tradeToDelete) setNewCheck(prev => ({...prev, trade: firstAvailable}));
                    if (editingChecklist && editingChecklist.trade === tradeToDelete) setEditingChecklist(prev => ({...prev, trade: firstAvailable}));
                }
            };

            const totalCount = checklists.length;
            const completedCount = checklists.filter(c => c.isCompleted).length;
            const pendingCount = totalCount - completedCount;

            if (!user) {
                return <div className="min-h-screen bg-slate-900 flex justify-center items-center"><i className="fa-solid fa-spinner fa-spin text-white text-3xl"></i></div>;
            }

            return (
                <div className="min-h-screen pb-20 relative">
                    {/* 토스트 알림 영역 */}
                    <div className="fixed top-20 right-4 z-50 space-y-2">
                        {toasts.map(t => (
                            <div key={t.id} className="bg-slate-800 text-white px-5 py-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-fade-in-down border border-slate-700">
                                <i className="fa-solid fa-circle-check text-emerald-400"></i>
                                <p className="text-sm font-bold">{t.message}</p>
                            </div>
                        ))}
                    </div>

                    {/* 상단 네비게이션 바 */}
                    <nav className="bg-slate-900 text-white sticky top-0 z-40 shadow-xl">
                        <div className="max-w-7xl mx-auto px-6 flex items-center justify-between h-16">
                            <div className="flex items-center gap-3">
                                <div className="bg-emerald-600 p-2 rounded-lg"><i className="fa-solid fa-clipboard-check"></i></div>
                                <h1 className="font-bold tracking-tight text-lg">동작 보라매역 프리센트</h1>
                            </div>
                        </div>
                    </nav>

                    {/* 메인 콘텐츠 */}
                    <main className="max-w-7xl mx-auto px-4 sm:px-6 py-8">
                        <div className="space-y-6 animate-fade-in">
                            {/* 등록 폼 */}
                            <div className="bg-white rounded-2xl shadow border border-slate-100 p-6">
                                <h2 className="text-xl font-bold mb-4 flex items-center gap-2 text-slate-800">
                                    <i className="fa-solid fa-pen-to-square text-blue-600"></i> 체크리스트
                                </h2>
                                <form onSubmit={onSubmit} className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-500">등록일자</label>
                                        <input type="date" className="w-full p-2.5 border rounded-lg text-sm bg-slate-50 focus:bg-white focus:border-blue-400 outline-none" value={newCheck.date} onChange={e=>setNewCheck({...newCheck, date:e.target.value})} required/>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-500">공종</label>
                                        <div className="flex gap-1">
                                            <select className="flex-1 p-2.5 border rounded-lg text-sm bg-slate-50 focus:bg-white focus:border-blue-400 outline-none" value={newCheck.trade} onChange={e=>setNewCheck({...newCheck, trade:e.target.value})}>
                                                {Object.keys(riskMapping).map(t=><option key={t}>{t}</option>)}
                                            </select>
                                            <button type="button" onClick={handleAddTrade} className="bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 rounded-lg border border-slate-200 transition" title="새 공종 추가">
                                                <i className="fa-solid fa-plus"></i>
                                            </button>
                                            <button type="button" onClick={() => handleDeleteTrade(newCheck.trade)} className="bg-rose-50 hover:bg-rose-100 text-rose-500 px-3 rounded-lg border border-rose-200 transition" title="현재 선택된 공종 삭제">
                                                <i className="fa-solid fa-minus"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-500">현장위치</label>
                                        <input type="text" className="w-full p-2.5 border rounded-lg text-sm bg-slate-50 focus:bg-white focus:border-blue-400 outline-none" placeholder="예: 101동 5층" value={newCheck.location} onChange={e=>setNewCheck({...newCheck, location:e.target.value})} required/>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-500">완료 예정일</label>
                                        <input type="date" className="w-full p-2.5 border rounded-lg text-sm bg-slate-50 focus:bg-white focus:border-blue-400 outline-none" value={newCheck.dueDate} onChange={e=>setNewCheck({...newCheck, dueDate:e.target.value})} required/>
                                    </div>
                                    <div className="space-y-1 md:col-span-2 lg:col-span-3">
                                        <label className="text-[10px] font-bold text-slate-500">점검 및 지시 내용</label>
                                        <input type="text" className="w-full p-2.5 border rounded-lg text-sm bg-slate-50 focus:bg-white focus:border-blue-400 outline-none" placeholder="작업자 지시사항이나 점검 내용을 입력하세요." value={newCheck.content} onChange={e=>setNewCheck({...newCheck, content:e.target.value})} required/>
                                    </div>
                                    <div className="flex gap-2 items-end">
                                        <label className="flex-1 bg-white border border-slate-300 text-slate-600 text-sm font-bold p-2.5 rounded-lg flex justify-center items-center cursor-pointer hover:bg-slate-50 transition">
                                            <i className="fa-solid fa-camera mr-2"></i> {img ? '사진 재선택' : '사진 첨부'}
                                            <input type="file" className="hidden" accept="image/*" onChange={handleImg} ref={fileRef}/>
                                        </label>
                                        <button type="submit" className="flex-1 bg-blue-600 text-white font-bold p-2.5 rounded-lg shadow hover:bg-blue-700 transition">등록하기</button>
                                    </div>
                                </form>
                                {img && <div className="mt-3 relative inline-block">
                                    <img src={img} className="h-24 object-cover rounded-lg border shadow-sm" alt="preview"/>
                                    <button type="button" onClick={()=>{setImg(null); if(fileRef.current) fileRef.current.value="";}} className="absolute -top-2 -right-2 bg-slate-800 text-white rounded-full w-6 h-6 flex items-center justify-center shadow-lg hover:bg-rose-500 transition"><i className="fa-solid fa-xmark text-xs"></i></button>
                                </div>}
                            </div>

                            {/* 현황 요약 보드 */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 flex justify-around divide-x divide-slate-100">
                                <div className="text-center w-full">
                                    <p className="text-xs font-bold text-slate-500 mb-1">총 점검 건수</p>
                                    <p className="text-2xl font-black text-slate-800">{totalCount}</p>
                                </div>
                                <div className="text-center w-full">
                                    <p className="text-xs font-bold text-slate-500 mb-1">조치 완료</p>
                                    <p className="text-2xl font-black text-emerald-500">{completedCount}</p>
                                </div>
                                <div className="text-center w-full">
                                    <p className="text-xs font-bold text-slate-500 mb-1">미조치 (진행중)</p>
                                    <p className="text-2xl font-black text-rose-500">{pendingCount}</p>
                                </div>
                            </div>

                            {/* 리스트 출력 영역 */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {checklists.map((c, idx) => (
                                    <div key={c.id} className={`bg-white rounded-xl border p-4 shadow-sm flex gap-4 transition-all ${c.isCompleted ? 'opacity-60 grayscale bg-slate-50' : 'border-slate-200 hover:border-blue-200'}`}>
                                        {c.image ? 
                                            <img src={c.image} onClick={() => setExpandedImage(c.image)} className="w-24 h-24 object-cover rounded-lg border cursor-pointer hover:opacity-80 transition shrink-0" alt="checklist"/> 
                                            : 
                                            <div className="w-24 h-24 bg-slate-100 rounded-lg flex items-center justify-center text-slate-300 shrink-0"><i className="fa-solid fa-image text-2xl"></i></div>
                                        }
                                        <div className="flex-1 relative flex flex-col">
                                            <div className="flex justify-between items-start mb-1">
                                                <div className="flex items-center gap-2">
                                                    <span className="text-xs font-black text-slate-400">#{checklists.length - idx}</span>
                                                    <span className="text-[10px] font-black text-blue-600 bg-blue-50 px-2 py-0.5 rounded border border-blue-100">{c.trade}</span>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <button onClick={()=>handleToggleChecklist(c.id, !c.isCompleted)} className={`px-3 py-1 rounded text-[10px] font-bold transition border ${c.isCompleted ? 'bg-emerald-500 text-white border-emerald-500' : 'bg-white text-slate-500 border-slate-300 hover:border-emerald-500 hover:text-emerald-600 shadow-sm'}`}>
                                                        {c.isCompleted ? <><i className="fa-solid fa-check-double mr-1"></i> 완료됨</> : <><i className="fa-solid fa-check mr-1"></i> 완료 처리</>}
                                                    </button>
                                                    <button onClick={()=>{setEditingChecklist(c); setEditImg(c.image || null);}} className="text-slate-300 hover:text-blue-500 transition ml-1" title="수정"><i className="fa-solid fa-pen"></i></button>
                                                    <button onClick={()=>handleDeleteChecklist(c.id)} className="text-slate-300 hover:text-rose-500 transition" title="삭제"><i className="fa-solid fa-trash-can"></i></button>
                                                </div>
                                            </div>
                                            <div className="text-xs font-bold text-slate-500 mb-1 flex items-center gap-1">
                                                <i className="fa-solid fa-location-dot text-rose-400"></i> {c.location}
                                            </div>
                                            <p className="text-sm font-bold text-slate-800 leading-snug flex-1 mb-6">{c.content}</p>
                                            
                                            <div className="absolute bottom-0 left-0 flex gap-2 text-[10px] font-medium bg-slate-100 px-2 py-1 rounded w-full">
                                                <span className="text-slate-500">등록: {c.date}</span>
                                                <span className="text-slate-300">|</span>
                                                <span className={c.isCompleted ? 'text-slate-500' : 'text-rose-500 font-bold'}>예정: {c.dueDate}</span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                                {checklists.length === 0 && (
                                    <div className="col-span-1 md:col-span-2 bg-white rounded-2xl border border-dashed border-slate-300 text-center py-16">
                                        <i className="fa-regular fa-clipboard text-4xl text-slate-300 mb-3"></i>
                                        <p className="text-slate-500 font-bold">등록된 체크리스트가 없습니다.</p>
                                        <p className="text-xs text-slate-400 mt-1">상단의 폼을 이용해 새로운 점검 내역을 추가해보세요.</p>
                                    </div>
                                )}
                            </div>

                            {/* 이미지 크게 보기 모달 */}
                            {expandedImage && (
                                <div className="fixed inset-0 z-50 bg-black/90 flex justify-center items-center p-4 cursor-pointer animate-fade-in" onClick={() => setExpandedImage(null)}>
                                    <button className="absolute top-6 right-6 text-white hover:text-rose-500 transition z-50"><i className="fa-solid fa-xmark text-4xl"></i></button>
                                    <img src={expandedImage} className="max-w-full max-h-full object-contain rounded-xl shadow-2xl cursor-default" onClick={(e) => e.stopPropagation()} alt="expanded"/>
                                </div>
                            )}

                            {/* 수정 모달 */}
                            {editingChecklist && (
                                <div className="fixed inset-0 z-50 bg-black/60 flex justify-center items-center p-4">
                                    <div className="bg-white rounded-2xl w-full max-w-2xl p-6 shadow-2xl animate-fade-in-down max-h-[90vh] overflow-y-auto">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="text-lg font-bold text-slate-800"><i className="fa-solid fa-pen-to-square text-blue-600"></i> 체크리스트 수정</h3>
                                            <button onClick={() => setEditingChecklist(null)} className="text-slate-400 hover:text-rose-500 text-xl"><i className="fa-solid fa-xmark"></i></button>
                                        </div>
                                        <form onSubmit={handleUpdateSubmit} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-slate-500">등록일자</label>
                                                <input type="date" className="w-full p-2.5 border rounded-lg text-sm bg-slate-50 focus:bg-white focus:border-blue-400 outline-none" value={editingChecklist.date} onChange={e=>setEditingChecklist({...editingChecklist, date:e.target.value})} required/>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-slate-500">공종</label>
                                                <div className="flex gap-1">
                                                    <select className="flex-1 p-2.5 border rounded-lg text-sm bg-slate-50 focus:bg-white focus:border-blue-400 outline-none" value={editingChecklist.trade} onChange={e=>setEditingChecklist({...editingChecklist, trade:e.target.value})}>
                                                        {Object.keys(riskMapping).map(t=><option key={t}>{t}</option>)}
                                                    </select>
                                                    <button type="button" onClick={handleAddTrade} className="bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 rounded-lg border border-slate-200 transition" title="새 공종 추가">
                                                        <i className="fa-solid fa-plus"></i>
                                                    </button>
                                                    <button type="button" onClick={() => handleDeleteTrade(editingChecklist.trade)} className="bg-rose-50 hover:bg-rose-100 text-rose-500 px-3 rounded-lg border border-rose-200 transition" title="현재 선택된 공종 삭제">
                                                        <i className="fa-solid fa-minus"></i>
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-slate-500">현장위치</label>
                                                <input type="text" className="w-full p-2.5 border rounded-lg text-sm bg-slate-50 focus:bg-white focus:border-blue-400 outline-none" value={editingChecklist.location} onChange={e=>setEditingChecklist({...editingChecklist, location:e.target.value})} required/>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-bold text-slate-500">완료 예정일</label>
                                                <input type="date" className="w-full p-2.5 border rounded-lg text-sm bg-slate-50 focus:bg-white focus:border-blue-400 outline-none" value={editingChecklist.dueDate} onChange={e=>setEditingChecklist({...editingChecklist, dueDate:e.target.value})} required/>
                                            </div>
                                            <div className="space-y-1 md:col-span-2">
                                                <label className="text-[10px] font-bold text-slate-500">점검 및 지시 내용</label>
                                                <input type="text" className="w-full p-2.5 border rounded-lg text-sm bg-slate-50 focus:bg-white focus:border-blue-400 outline-none" value={editingChecklist.content} onChange={e=>setEditingChecklist({...editingChecklist, content:e.target.value})} required/>
                                            </div>
                                            <div className="md:col-span-2">
                                                <label className="text-[10px] font-bold text-slate-500 mb-1 block">사진 수정</label>
                                                <div className="flex gap-4 items-start">
                                                    <div className="relative">
                                                        {editImg ? (
                                                            <div className="relative inline-block">
                                                                <img src={editImg} className="h-24 w-24 object-cover rounded-lg border shadow-sm" alt="preview"/>
                                                                <button type="button" onClick={()=>{setEditImg(null); if(editFileRef.current) editFileRef.current.value="";}} className="absolute -top-2 -right-2 bg-slate-800 text-white rounded-full w-6 h-6 flex items-center justify-center shadow-lg hover:bg-rose-500 transition"><i className="fa-solid fa-xmark text-xs"></i></button>
                                                            </div>
                                                        ) : (
                                                            <div className="h-24 w-24 bg-slate-100 rounded-lg flex items-center justify-center text-slate-300 border border-dashed border-slate-300"><i className="fa-solid fa-image text-2xl"></i></div>
                                                        )}
                                                    </div>
                                                    <div className="flex-1">
                                                        <label className="bg-white border border-slate-300 text-slate-600 text-sm font-bold p-2.5 rounded-lg flex justify-center items-center cursor-pointer hover:bg-slate-50 transition w-full">
                                                            <i className="fa-solid fa-camera mr-2"></i> 새 사진 첨부
                                                            <input type="file" className="hidden" accept="image/*" onChange={handleEditImg} ref={editFileRef}/>
                                                        </label>
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="md:col-span-2 flex gap-2 mt-4">
                                                <button type="button" onClick={() => setEditingChecklist(null)} className="flex-1 bg-slate-200 text-slate-700 font-bold py-3 rounded-lg hover:bg-slate-300 transition">취소</button>
                                                <button type="submit" className="flex-1 bg-blue-600 text-white font-bold py-3 rounded-lg shadow hover:bg-blue-700 transition">수정 완료</button>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
